<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صيدليات المناوبة - داريا</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', Arial, sans-serif;
            background: linear-gradient(135deg, #1b4d3e 0%, #2d5a4a 100%);
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1b4d3e 0%, #2d5a4a 100%);
            color: white;
            padding: 25px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .header .subtitle {
            font-size: 16px;
            opacity: 0.9;
        }

        .header .date {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 20px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 10px;
            font-size: 14px;
        }

        /* Today's Duty Card */
        .today-card {
            background: linear-gradient(135deg, #f4d06f 0%, #e5b84a 100%);
            color: #1b4d3e;
            padding: 25px 20px;
            margin: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(244, 208, 111, 0.4);
        }

        .today-card h2 {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pharmacy-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .pharmacy-item .name {
            font-size: 18px;
            font-weight: 700;
            color: #1b4d3e;
            margin-bottom: 8px;
        }

        .pharmacy-item .address {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }

        .pharmacy-item .hours {
            font-size: 13px;
            color: #1b4d3e;
            font-weight: 600;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #eee;
        }

        /* Search Section */
        .search-section {
            padding: 0 20px 20px;
        }

        .search-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .search-box label {
            font-size: 16px;
            font-weight: 700;
            color: #1b4d3e;
            margin-bottom: 10px;
            display: block;
        }

        .search-box input,
        .search-box select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: 'Tajawal', Arial, sans-serif;
            margin-bottom: 10px;
        }

        .search-box input:focus,
        .search-box select:focus {
            outline: none;
            border-color: #1b4d3e;
        }

        .search-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #1b4d3e 0%, #2d5a4a 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Tajawal', Arial, sans-serif;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .search-btn:active {
            transform: scale(0.98);
        }

        /* Results */
        .results {
            padding: 0 20px 20px;
            display: none;
        }

        .results.active {
            display: block;
        }

        .results h3 {
            font-size: 18px;
            color: #1b4d3e;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #1b4d3e;
        }

        /* Full Schedule */
        .schedule-section {
            padding: 0 20px 30px;
        }

        .schedule-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #b89935 0%, #9a7d2a 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Tajawal', Arial, sans-serif;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .schedule-list {
            display: none;
        }

        .schedule-list.active {
            display: block;
        }

        .schedule-day {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-right: 4px solid #1b4d3e;
        }

        .schedule-day .date {
            font-size: 16px;
            font-weight: 700;
            color: #1b4d3e;
            margin-bottom: 10px;
        }

        .schedule-day .pharmacy {
            font-size: 15px;
            color: #333;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .schedule-day .pharmacy:last-child {
            border-bottom: none;
        }

        /* Footer */
        .footer {
            background: #1b4d3e;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 14px;
        }

        .footer .note {
            font-size: 13px;
            opacity: 0.9;
            margin-top: 10px;
        }

        /* No Results */
        .no-results {
            text-align: center;
            padding: 30px;
            color: #666;
        }

        .no-results .icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 30px;
            color: #1b4d3e;
        }

        /* Responsive */
        @media (max-width: 400px) {
            .header h1 {
                font-size: 22px;
            }
            .today-card h2 {
                font-size: 18px;
            }
            .pharmacy-item .name {
                font-size: 16px;
            }
        }
    </style>
</head>

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            setCurrentDate();
            showTodayDuty();
            populateDateSelect();
            renderFullSchedule();
        });

        // Set Current Date
        function setCurrentDate() {
            const now = new Date();
            const dateStr = `${dayNames[now.getDay()]} ${now.getDate()} ${monthNames[now.getMonth()]} ${now.getFullYear()}`;
            document.getElementById('currentDate').textContent = `📅 ${dateStr}`;
        }

        // Show Today's Duty
        function showTodayDuty() {
            const now = new Date();
            const day = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const key = `${day}/${month}`;
            
            const container = document.getElementById('todayPharmacies');
            
            // Check if April 2026
            if (now.getMonth() !== 3 || now.getFullYear() !== 2026) {
                container.innerHTML = `
                    <div class="no-results">
                        <div class="icon">📅</div>
                        <p>البيانات المتاحة لشهر نيسان 2026 فقط</p>

                return;

                            <div class="address">📍 ${pharmacy.address}</div>

            const days = ["الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
            
            for (let day = 1; day <= 30; day++) {
                const date = new Date(2026, 3, day);
                const dayName = days[date.getDay()];
                const key = `${String(day).padStart(2, '0')}/04`;
                const option = document.createElement('option');
                option.value = key;
                option.textContent = `${dayName} ${day}/4/2026`;
                select.appendChild(option);
            }
        }

        // Search by Pharmacy
        function searchByPharmacy() {
            const query = document.getElementById('pharmacySearch').value.trim();
            const resultsDiv = document.getElementById('searchResults');
            const resultsContent = document.getElementById('resultsContent');
            const resultsTitle = document.getElementById('resultsTitle');

            if (!query) {
                alert('يرجى كتابة اسم الصيدلية');
                return;
            }

            let found = [];
            for (const [date, pharmacies] of Object.entries(pharmacyData)) {
                pharmacies.forEach(pharmacy => {
                    if (pharmacy.name.includes(query)) {
                        found.push({date, pharmacy});
                    }
                });
            }

            if (found.length > 0) {
                resultsTitle.textContent = `نتائج البحث عن "${query}"`;
                let html = '';
                found.forEach(item => {
                    html += `
                        <div class="pharmacy-item">
                            <div class="name">📅 ${item.date} - 🏥 ${item.pharmacy.name}</div>
                            <div class="address">📍 ${item.pharmacy.address}</div>
                        </div>
                    `;
                });
                resultsContent.innerHTML = html;
                resultsDiv.classList.add('active');
            } else {
                resultsTitle.textContent = `لا نتائج لـ "${query}"`;
                resultsContent.innerHTML = `
                    <div class="no-results">
                        <div class="icon">🔍</div>

                `;
                resultsDiv.classList.add('active');
            }

            resultsDiv.scrollIntoView({behavior: 'smooth'});
        }

        // Search by Date
        function searchByDate() {
            const date = document.getElementById('dateSearch').value;
            const resultsDiv = document.getElementById('searchResults');
            const resultsContent = document.getElementById('resultsContent');
            const resultsTitle = document.getElementById('resultsTitle');

            if (!date) {
                alert('يرجى اختيار التاريخ');
                return;
            }

                    </div>

                resultsDiv.classList.add('active');
            }

            resultsDiv.scrollIntoView({behavior: 'smooth'});
        }

        // Toggle Full Schedule
        function toggleSchedule() {
            const scheduleList = document.getElementById('scheduleList');
            scheduleList.classList.toggle('active');
            scheduleList.scrollIntoView({behavior: 'smooth'});
        }

        // Render Full Schedule
        function renderFullSchedule() {
            const container = document.getElementById('scheduleList');
            const days = ["الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];

                const dayName = days[date.getDay()];
                const key = `${String(day).padStart(2, '0')}/04`;
                
                if (pharmacyData[key]) {
                    html += `
                        <div class="schedule-day">
                            <div class="date">${dayName} ${day}/4/2026</div>
                    `;
                    pharmacyData[key].forEach(pharmacy => {
                        html += `
                            <div class="pharmacy">
                                🏥 ${pharmacy.name}<br>
                                📍 ${pharmacy.address}
                            </div>
                        `;
                    });
                    html += `</div>`;
                }
            }
            container.innerHTML = html;
