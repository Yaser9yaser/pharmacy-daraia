        function normalizeText(text) {
            if (!text) return '';
            return text.toLowerCase()
                .replace(/[أإآ]/g, 'ا').replace(/ء/g, '').replace(/ؤ/g, 'و').replace(/ئ/g, 'ي')
                .replace(/ة/g, 'ه').replace(/ى/g, 'ي').replace(/ال/g, 'ل')
                .replace(/[ًٌٍّ]/g, '').replace(/\s+/g, ' ').trim();
        }

        function isFriday(dateStr) {
            const [day, month] = dateStr.split('/').map(Number);
            const date = new Date(2026, month - 1, day);
            return date.getDay() === 5;
        }

        function getEffectiveDate() {
            const now = new Date();
            const hour = now.getHours();
            if (hour < 2) {
                const yesterday = new Date(now);
                yesterday.setDate(now.getDate() - 1);
                return yesterday;
            }
            return now;
        }

        document.addEventListener('DOMContentLoaded', function() {
            setCurrentDate();
            showTodayDuty();
            populateDateSelect();
            renderFullSchedule();
        });

        function setCurrentDate() {
            const effectiveDate = getEffectiveDate();
            const dateStr = `${dayNames[effectiveDate.getDay()]} ${effectiveDate.getDate()} ${monthNames[effectiveDate.getMonth()]} ${effectiveDate.getFullYear()}`;
            document.getElementById('currentDate').textContent = `📅 ${dateStr}`;
        }

        function showTodayDuty() {

            const month = String(effectiveDate.getMonth() + 1).padStart(2, '0');

                option.value = key;
                const fridayText = isFriday(key) ? 'الجمعة • 10 صيدليات | ' : '';
                option.textContent = `${fridayText}${dayName} ${day}/4/2026`;
                select.appendChild(option);
            }
        }

        function searchByPharmacy() {
            const query = document.getElementById('pharmacySearch').value.trim();
            const resultsDiv = document.getElementById('searchResults');
            const resultsContent = document.getElementById('resultsContent');
            const resultsTitle = document.getElementById('resultsTitle');
            if (!query) { alert('يرجى كتابة اسم الصيدلية أو العنوان'); return; }
            const normalizedQuery = normalizeText(query);
            let found = [];
            for (const [date, pharmacies] of Object.entries(pharmacyData)) {
                pharmacies.forEach(pharmacy => {
                    const normalizedName = normalizeText(pharmacy.name);
                    const normalizedAddress = normalizeText(pharmacy.address);
                    if (normalizedName.includes(normalizedQuery) || normalizedAddress.includes(normalizedQuery)) {
                        found.push({date, pharmacy});
                    }
                });
            }
            if (found.length > 0) {
                resultsTitle.textContent = `نتائج البحث عن "${query}"`;
                let html = '';
                found.forEach(item => {
                    html += `<div class="pharmacy-item">
                        <div class="name">📅 ${item.date} — 💊 ${item.pharmacy.name}</div>
                        ${item.pharmacy.address ? `<div class="address">📍 ${item.pharmacy.address}</div>` : ''}
                        <button class="share-btn" onclick="sharePharmacy('${item.pharmacy.name}', '${item.pharmacy.address || ''}')">📱 شارك</button>
                    </div>`;
                });
                resultsContent.innerHTML = html;
                resultsDiv.classList.add('active');
            } else {
                resultsTitle.textContent = `لا نتائج لـ "${query}"`;
                resultsContent.innerHTML = `<div class="no-results"><p>لم يتم العثور على صيدلية بهذا الاسم أو العنوان</p></div>`;
                resultsDiv.classList.add('active');
            }
            resultsDiv.scrollIntoView({behavior: 'smooth'});
        }

        function searchByDate() {
            const date = document.getElementById('dateSearch').value;
            const resultsDiv = document.getElementById('searchResults');
            const resultsContent = document.getElementById('resultsContent');
            const resultsTitle = document.getElementById('resultsTitle');
            if (!date) { alert('يرجى اختيار التاريخ'); return; }
            if (pharmacyData[date]) {
                resultsTitle.textContent = `مناوبات تاريخ ${date}`;
                let html = '';
                pharmacyData[date].forEach(pharmacy => {
                    html += `<div class="pharmacy-item">
                        <div class="name">💊 ${pharmacy.name}</div>
                        ${pharmacy.address ? `<div class="address">📍 ${pharmacy.address}</div>` : ''}
                        <div class="hours">⏰ من 10 مساءً حتى 1 بعد منتصف الليل</div>
                        <button class="share-btn" onclick="sharePharmacy('${pharmacy.name}', '${pharmacy.address || ''}')">📱 شارك</button>
                    </div>`;
                });
                resultsContent.innerHTML = html;
                resultsDiv.classList.add('active');
            } else {
                resultsTitle.textContent = `لا توجد مناوبات بتاريخ ${date}`;
                resultsContent.innerHTML = `<div class="no-results"><p>لا توجد مناوبات مسجلة لهذا اليوم</p></div>`;
                resultsDiv.classList.add('active');
            }
            resultsDiv.scrollIntoView({behavior: 'smooth'});
        }

        async function sharePharmacy(name, address) {
            const text = `💊 صيدلية ${name}\n📍 ${address}\n⏰ من 10 مساءً حتى 1 بعد منتصف الليل\n\nمنارة وطن\nصيدليات المناوبة - داريا\n🔗 https://pharmacy-daraia.vercel.app`;
            
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'صيدليات المناوبة - داريا',
                        text: text,
                        url: 'https://pharmacy-daraia.vercel.app'
                    });
                    return;
                } catch (err) {
                    if (err.name !== 'AbortError') console.log('Share cancelled');
                }
            }
            const whatsappText = encodeURIComponent(text);
            window.open(`https://wa.me/?text=${whatsappText}`, '_blank');
        }

        function shareSite() {
            const text = `صيدليات المناوبة - مدينة داريا\nمنارة وطن\nإهداءً لأرواح شهداء داريا\n🔗 https://pharmacy-daraia.vercel.app`;
            
            if (navigator.share) {
                navigator.share({
                    title: 'صيدليات المناوبة - داريا',
                    text: text,
                    url: 'https://pharmacy-daraia.vercel.app'
                }).catch(() => {});
            } else {
                const whatsappText = encodeURIComponent(text);
                window.open(`https://wa.me/?text=${whatsappText}`, '_blank');
            }
        }

        function toggleSchedule() {
            const scheduleList = document.getElementById('scheduleList');
            scheduleList.classList.toggle('active');
            scheduleList.scrollIntoView({behavior: 'smooth'});
        }

        function showFridayInSchedule() {
            toggleSchedule();
        }

        function renderFullSchedule() {
            const container = document.getElementById('scheduleList');
            let html = '';
            for (let day = 1; day <= 30; day++) {
                const date = new Date(2026, 3, day);
                const dayName = dayNames[date.getDay()];
                const key = `${String(day).padStart(2, '0')}/04`;
                if (pharmacyData[key]) {
                    const isFri = isFriday(key);
                    html += `<div class="schedule-day${isFri ? ' friday' : ''}">
                        <div class="date">${dayName} ${day}/4/2026${isFri ? ' <span class="friday-badge">الجمعة • 10 صيدليات</span>' : ''}</div>`;
                    pharmacyData[key].forEach(pharmacy => {
                        html += `<div class="pharmacy">💊 ${pharmacy.name}${pharmacy.address ? `<br>📍 ${pharmacy.address}` : ''}</div>`;
                    });
                    html += `</div>`;
                }
            }
            container.innerHTML = html;
        }
    </script>
</body>
